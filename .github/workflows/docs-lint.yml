name: Docs Lint

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  link-check:
    name: Markdown link integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check markdown links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          format: markdown
          jobSummary: true
          args: >-
            --config lychee.toml
            --verbose
            --no-progress
            './**/*.md'
